name: Generate Daily Puzzle

# Runs every day and ensures the next 3 days of puzzles (UTC) exist,
# generating any that are missing and committing the updated
# public/puzzles/<year>.json back to the repo.
on:
  schedule:
    # 06:00 UTC daily. Adjust the cron if you want a different time.
    - cron: "0 6 * * *"
  # Allows manually triggering the workflow from the Actions tab.
  workflow_dispatch:

# Needed so the workflow can push the regenerated puzzle file.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate missing puzzles for the next 3 days
        run: |
          # Check tomorrow, the day after, and 3 days from now (UTC).
          # For each day, generate the puzzle only if it doesn't already exist.
          for OFFSET in 1 2 3; do
            YEAR=$(date -u -d "+$OFFSET day" +%Y)
            MONTH=$(date -u -d "+$OFFSET day" +%-m)
            DAY=$(date -u -d "+$OFFSET day" +%-d)
            DATE_STR=$(date -u -d "+$OFFSET day" +%Y-%m-%d)
            FILE="public/puzzles/$YEAR.json"

            if [ -f "$FILE" ] && node -e "const d=require('./$FILE'); process.exit(d['$DATE_STR'] ? 0 : 1)"; then
              echo "Puzzle for $DATE_STR already exists — skipping."
              continue
            fi

            echo "Generating puzzle for $DATE_STR..."
            node scripts/generate-puzzles.mjs \
              --year=$YEAR \
              --startMonth=$MONTH \
              --startDay=$DAY \
              --endMonth=$MONTH \
              --endDay=$DAY
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles/
          if git diff --staged --quiet; then
            echo "No puzzle changes to commit (next 3 days already exist)."
          else
            git commit -m "chore: generate missing puzzles for the next 3 days"
            git push
          fi
